_format_version: '3.0'
_transform: true

consumers:
- username: digit-dev
  keyauth_credentials:
  - key: digit-dev-api-key-change-me
  tags: [development]
- username: digit-admin
  keyauth_credentials:
  - key: digit-admin-api-key-change-me
  tags: [admin]

plugins:
- name: cors
  config:
    origins: ['*']
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    headers: [Accept, Accept-Version, Content-Length, Content-Type, Authorization, X-API-Key, X-Requested-With, auth-token]
    exposed_headers: [X-Auth-Token]
    credentials: true
    max_age: 3600
- name: request-size-limiting
  config:
    allowed_payload_size: 50
    size_unit: megabytes

services:
  # ==================== CORE DIGIT ====================
  - name: mdms-service
    url: http://egov-mdms-service:8094
    routes:
    - name: mdms-route
      paths: [/mdms-v2]
      strip_path: false
    - name: mdms-v1-compat-route
      paths: [/egov-mdms-service]
      strip_path: false

  - name: user-service
    url: http://egov-user:8107
    routes:
    - name: user-route
      paths: [/user]
      strip_path: false
  - name: user-auth-public
    url: http://egov-user:8107
    routes:
    - name: user-oauth-route
      paths: [/user/oauth/token]
      strip_path: false
      methods: [POST]

  - name: enc-service
    url: http://egov-enc-service:1234
    routes:
    - name: enc-route
      paths: [/egov-enc-service]
      strip_path: false

  - name: idgen-service
    url: http://egov-idgen:8088
    routes:
    - name: idgen-route
      paths: [/egov-idgen]
      strip_path: false

  - name: workflow-service
    url: http://egov-workflow-v2:8109
    routes:
