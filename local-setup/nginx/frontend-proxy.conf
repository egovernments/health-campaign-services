# HCM frontend reverse proxy.
# Provides a single-origin entrypoint for:
#   - the DIGIT UIs (payments-ui, workbench-ui)
#   - all API calls (forwarded to Kong)
#   - a local /digit-ui-assets/ static path used by the injected globalConfigs.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;

    # ---- Local asset bundle (globalConfigs JS + any other static helpers) ----
    location /digit-ui-assets/ {
        alias /usr/share/nginx/html/digit-ui-assets/;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # ---- UI containers (each is an nginx serving its own SPA on :80) ----
    location /payments-ui/ {
        proxy_pass http://payments-ui:80/payments-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /workbench-ui/ {
        proxy_pass http://workbench-ui:80/workbench-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Convenience landing page: redirect / to workbench employee ----
    location = / {
        return 302 /workbench-ui/employee;
    }

    # ---- Everything else is treated as an API call -> Kong ----
    location / {
        proxy_pass http://kong:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- Liveness probe ----
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
