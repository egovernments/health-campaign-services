      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - hcm-network

  egov-accesscontrol:
    image: egovio/egov-accesscontrol:master-1e8d2bb
    container_name: hcm-egov-accesscontrol
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
