      FLYWAY_LOCATIONS: filesystem:/migrations/main
      KAFKA_BROKER_HOST: redpanda:9092
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
      KAFKA_CREATE_PROCESSED_BOUNDARY_MANAGEMENT_TOPIC: create-processed-boundary-management
      KAFKA_UPDATE_PROCESSED_BOUNDARY_MANAGEMENT_TOPIC: update-processed-boundary-management
      KAFKA_UPDATE_GENERATED_BOUNDARY_MANAGEMENT_TOPIC: update-generated-boundary-management
      KAFKA_CREATE_GENERATED_BOUNDARY_MANAGEMENT_TOPIC: create-generated-boundary-management
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_V2_HOST: http://egov-mdms-service:8094
      EGOV_FILESTORE_SERVICE_HOST: http://egov-filestore:8083
      EGOV_BOUNDARY_HOST: http://boundary-service:8081
      EGOV_LOCALIZATION_HOST: http://egov-localization:8096
      EGOV_HOST: http://kong:8000/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CONTEXT_PATH: /boundary-management
      DEFAULT_TENANT_ID: mz
      LOCALE: en_MZ
      LOCALIZATION_MODULE: hcm-admin-schemas
      CACHE_ENABLED: 'true'
    ports:
      - "28116:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/boundary-management/health >/dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    networks:
      - hcm-network

  resource-generator:
    image: egovio/resource-generator:microplanning-dev-0aca221
    container_name: hcm-resource-generator
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_FLYWAY_ENABLED: 'false'
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: resource-generator
      KAFKA_CONFIG_BOOTSTRAP_SERVER_CONFIG: redpanda:9092
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /resource-generator
      STATE_LEVEL_TENANT_ID: mz
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_SEARCH_ENDPOINT: /egov-mdms-service/v1/_search
      EGOV_FILESTORE_SERVICE_HOST: http://egov-filestore:8083
      EGOV_PLAN_CONFIG_HOST: http://plan-service:8080
      EGOV_PROJECT_FACTORY_HOST: http://project-factory:8080
      EGOV_BOUNDARY_SERVICE_HOST: http://boundary-service:8081
      EGOV_LOCALE_SERVICE_HOST: http://egov-localization:8096
      EGOV_CENSUS_HOST: http://census-service:8080
      OTEL_TRACES_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m
    ports:
      - "28117:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/resource-generator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - hcm-network

  # ==================== GATEWAY ====================

  kong:
    image: kong:3.6
    container_name: hcm-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:28002
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_MEM_CACHE_SIZE: 64m
      KONG_NGINX_WORKER_PROCESSES: 1
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "28000:8000"
      - "28443:8443"
      - "28001:8001"
      - "28002:8002"
      - "28100:8100"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - hcm-network

  # ==================== MONITORING ====================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: hcm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13133:13133"
    networks:
      - hcm-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: hcm-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./otel/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - hcm_tempo_data:/var/tempo
    ports:
      - "13200:3200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hcm-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: hcm-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - hcm_grafana_data:/var/lib/grafana
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - hcm-network

  # ==================== SERVICE HEALTH DASHBOARD ====================
  gatus:
    image: twinproduction/gatus:latest
    container_name: hcm-gatus
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
    ports:
      - "28889:8080"
    environment:
      GATUS_CONFIG_PATH: /config/config.yaml
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - hcm-network

  # ==================== CONTAINER DASHBOARD ====================
  portainer:
    image: portainer/portainer-ce:2.21.5
    container_name: hcm-portainer
    command: --no-analytics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - hcm_portainer_data:/data
    ports:
      - "29009:9000"
    restart: unless-stopped
    networks:
      - hcm-network

networks:
  hcm-network:
    driver: bridge

volumes:
  hcm_postgres_data:
  hcm_minio_data:
  hcm_tempo_data:
  hcm_grafana_data:
  hcm_portainer_data:
