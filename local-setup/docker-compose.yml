      - hcm-network

  # ==================== GATEWAY ====================

  kong:
    image: kong:3.6
    container_name: hcm-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:28002
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_MEM_CACHE_SIZE: 64m
      KONG_NGINX_WORKER_PROCESSES: 1
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "28000:8000"
      - "28443:8443"
      - "28001:8001"
      - "28002:8002"
      - "28100:8100"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - hcm-network

  # ==================== MONITORING ====================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: hcm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13133:13133"
    networks:
      - hcm-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: hcm-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./otel/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - hcm_tempo_data:/var/tempo
    ports:
      - "13200:3200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hcm-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: hcm-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - hcm_grafana_data:/var/lib/grafana
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - hcm-network

  # ==================== SERVICE HEALTH DASHBOARD ====================
  gatus:
    image: twinproduction/gatus:latest
    container_name: hcm-gatus
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
    ports:
      - "28889:8080"
    environment:
      GATUS_CONFIG_PATH: /config/config.yaml
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - hcm-network

  # ==================== CONTAINER DASHBOARD ====================
  portainer:
    image: portainer/portainer-ce:2.21.5
    container_name: hcm-portainer
    command: --no-analytics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - hcm_portainer_data:/data
    ports:
      - "29009:9000"
    restart: unless-stopped
    networks:
      - hcm-network

networks:
  hcm-network:
    driver: bridge

volumes:
  hcm_postgres_data:
  hcm_minio_data:
  hcm_tempo_data:
  hcm_grafana_data:
  hcm_portainer_data:
