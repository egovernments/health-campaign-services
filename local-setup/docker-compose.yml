# HCM (Health Campaign Management) Docker Compose
# Standalone — includes all infrastructure, core DIGIT, and HCM services.
# DB schema for core DIGIT is bootstrapped from the existing full-dump.sql.
# HCM services run their own Flyway migrations on first start.
#
# Start: docker compose -f docker-compose.hcm.yml up -d
# Stop:  docker compose -f docker-compose.hcm.yml down

services:

  # ==================== INFRASTRUCTURE ====================

  postgres-db:
    image: postgres:16
    container_name: hcm-postgres
    environment:
      POSTGRES_USER: egov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      POSTGRES_DB: egov
    command: ["bash","-c","mkdir -p /etc/postgresql-ssl && if [ ! -f /etc/postgresql-ssl/server.crt ]; then openssl req -new -x509 -days 365 -nodes -text -out /etc/postgresql-ssl/server.crt -keyout /etc/postgresql-ssl/server.key -subj \"/CN=postgres\" && chmod 0600 /etc/postgresql-ssl/server.key && chown postgres:postgres /etc/postgresql-ssl/server.*; fi; exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=/etc/postgresql-ssl/server.crt -c ssl_key_file=/etc/postgresql-ssl/server.key -c max_connections=300"]
    volumes:
      - hcm_postgres_data:/var/lib/postgresql/data
      - ./db/full-dump.sql:/docker-entrypoint-initdb.d/01-full-dump.sql:ro
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egov"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - hcm-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: hcm-pgbouncer
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: egov
      DB_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      DB_NAME: egov
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "egov"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      hcm-network:
        aliases:
          - postgres
  kafka-topics-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: hcm-kafka-topics-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash","-c"]
    command:
      - |
        for t in start-admin-console-task start-admin-console-mapping-task \
                 test-topic-project-factory hcm-processing-result \
                 hcm-facility-create-batch hcm-user-create-batch \
                 hcm-mapping-batch hcm-campaign-mark-failed; do
          rpk topic create -X brokers=redpanda:9092 "$$t" 2>&1 | tail -1
        done
    restart: "no"
    networks:
      - hcm-network

  redis:
    image: redis:7.2.4
    container_name: hcm-redis
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - hcm-network

  # Redpanda — Kafka-compatible. Aliased as 'kafka' for full compatibility.
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: hcm-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 2G
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --pandaproxy-addr PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr PLAINTEXT://redpanda:8082
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "29092:9092"
      - "28082:8082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2400M
          cpus: '1'
    networks:
      hcm-network:
        aliases:
          - kafka
          - kafka-v2.kafka-cluster

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: hcm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - hcm_minio_data:/data
    ports:
      - "29000:9000"
      - "29001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - hcm-network

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: hcm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/egov-rainmaker;
      mc anonymous set download myminio/egov-rainmaker;
      exit 0;"
    restart: "no"
    networks:
      - hcm-network

  # ==================== CORE DIGIT SERVICES ====================
  # Flyway disabled — schemas pre-loaded via full-dump.sql

  mdms-backend:
    image: egovio/mdms-v2:master-1e8d2bb
    container_name: hcm-mdms-backend
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_ENABLED: 'false'
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8094
      OTEL_TRACES_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/mdms-v2/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    networks:
      - hcm-network

  egov-mdms-service:
    image: nginx:alpine
    container_name: hcm-egov-mdms-service
    depends_on:
      mdms-backend:
        condition: service_healthy
    volumes:
      - ./nginx/mdms-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "28094:8094"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST 'http://localhost:8094/mdms-v2/v1/_search' -H 'Content-Type: application/json' -d '{\"RequestInfo\":{\"apiId\":\"health\"},\"MdmsCriteria\":{\"tenantId\":\"pg\",\"moduleDetails\":[{\"moduleName\":\"tenant\",\"masterDetails\":[{\"name\":\"tenants\"}]}]}}'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - hcm-network

  egov-enc-service:
    image: egovio/egov-enc-service:v2.9.2-4a60f20
    container_name: hcm-egov-enc-service
    depends_on:
      egov-mdms-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_ENABLED: 'false'
      SERVER_PORT: 1234
      MASTER_PASSWORD: ${ENC_MASTER_PASSWORD:-asd@#$@$!132123}
      MASTER_SALT: ${ENC_MASTER_SALT:-qweasdzx}
      MASTER_INITIALVECTOR: ${ENC_MASTER_INITIALVECTOR:-qweasdzxqwea}
      MASTER_PASSWORD_PROVIDER: software
      EGOV_MDMS_HOST: http://egov-mdms-service:8094
      EGOV_MDMS_SEARCH_ENDPOINT: /mdms-v2/v1/_search
      EGOV_STATE_LEVEL_TENANT_ID: mz
      STATE_LEVEL_TENANT_ID: mz
      OTEL_TRACES_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    ports:
      - "21234:1234"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1234/egov-enc-service/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
