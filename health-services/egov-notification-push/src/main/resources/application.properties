#---------------------------- DATABASE CONFIGURATIONS -----------------------------#
spring.datasource.driver-class-name=io.opentelemetry.instrumentation.jdbc.OpenTelemetryDriver
#spring.datasource.url=jdbc:postgresql://localhost:5432/mseva
spring.datasource.url=jdbc:postgresql://localhost:5432/push_notification
spring.datasource.username=postgres
spring.datasource.password=postgres

#----------------------------- FLYWAY CONFIGURATIONS ------------------------------#
#spring.flyway.url=jdbc:postgresql://localhost:5432/mseva
spring.flyway.url=jdbc:postgresql://localhost:5432/push_notification
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=push_notification_schema_version
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

#--------------------------- PATH & PORT CONFIGURATIONS ---------------------------#
server.servlet.context-path=/egov-notification-push
server.context-path=/egov-notification-push
server.port=8082
management.endpoints.web.base-path=/

#---------------------------- TIMEZONE CONFIGURATIONS -----------------------------#
app.timezone=UTC

#------------------------------ KAFKA CONFIGURATIONS ------------------------------#
# KAFKA SERVER CONFIGURATIONS
spring.kafka.bootstrap-servers=localhost:9092

# SPRING KAFKA CONSUMER CONFIGURATIONS
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=egov-notification-push-group
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# SPRING KAFKA PRODUCER CONFIGURATIONS
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# KAFKA TOPIC CONFIGURATIONS
kafka.topics.notification.push=egov.core.notification.push
kafka.topics.persister.save.device.token=save-push-device-token
kafka.topics.persister.delete.device.token=delete-push-device-token

#----------------------- CENTRAL INSTANCE / MULTI-TENANCY -------------------------#
state.level.tenant.id=default
state.level.tenantid.length=1
state.schema.index.position.tenantid=0
is.environment.central.instance=false
kafka.tenant.id.pattern=ba-

#------------------------------ FCM CONFIGURATIONS --------------------------------#
fcm.enabled=false
fcm.service-account-key-json=${FCM_SERVICE_ACCOUNT_KEY_JSON:}
fcm.batch.size=500

#------------------------------ TRACER CONFIGURATIONS -----------------------------#
tracer.kafkaMessageLoggingEnabled=true
tracer.errorsTopic=notification-push-deadletter

#------------------------------ LOGGER CONFIGURATIONS -----------------------------#
logging.pattern.console=%clr(%X{CORRELATION_ID:-}) %clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}

otel.traces.exporter=otlp
otel.service.name=egov-notification-push
otel.logs.exporter=none
otel.metrics.exporter=none
otel.exporter.otlp.endpoint=http://jaeger-collector.tracing:4318
otel.exporter.otlp.protocol=http/protobuf
otel.instrumentation.kafka.enabled=true
otel.instrumentation.kafka.experimental-span-attributes=true
otel.instrumentation.http.server.ignore-urls=/egov-notification-push/health,/egov-notification-push/promethus
