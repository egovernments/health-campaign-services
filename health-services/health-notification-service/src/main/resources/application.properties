server.servlet.context-path=/health-notification-service
server.port=8080
app.timezone=UTC

spring.main.allow-bean-definition-overriding=true

# DATABASE CONFIG
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# FLYWAY CONFIG
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=public
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

# KAFKA SERVER CONFIG
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=health-notification-service
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# KAFKA CONSUMER CONFIG
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest

# KAFKA PRODUCER CONFIG
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432

# KAFKA TOPICS
# Project Task Topics
project.task.consumer.create.topic=save-project-task-topic

# SMS Topics (Producer)
kafka.topics.notification.sms=egov.core.notification.sms

# Scheduled Notification Persister Topics
scheduled.notification.save.topic=save-scheduled-notification-topic
scheduled.notification.update.topic=update-scheduled-notification-topic

# MDMS-V2 CONFIG
egov.mdms.host=http://localhost:7035/
egov.mdms.search.endpoint=/mdms-v2/v1/_search
egov.mdms.search.v2.endpoint=/mdms-v2/v2/_search



# Localization config
egov.localization.host=http://localhost:7034/
egov.localization.context.path=localization/messages/v1
egov.localization.search.endpoint=/_search
egov.localization.statelevel=true
egov.localization.notification.module=health-notification
egov.localization.supported.locales=en_NG,fr_NG

# Central Instance Multi Tenancy Configuration
state.level.tenant.id=ba
state.level.tenantid.length=1
state.schema.index.position.tenantid=0
is.environment.central.instance=false


# This pattern is used in consumer topicPattern to match state-specific topics
kafka.tenant.id.pattern=ba-

# External Service Integration
# Household Service
egov.household.host=http://localhost:7033/
egov.household.search.url=/household/v1/_search
egov.household.member.search.url=/household/member/v1/_search

# Individual Service
egov.individual.host=http://localhost:7037/
egov.individual.search.url=/individual/v1/_search

# Project Service (includes project and beneficiary endpoints)
egov.project.host=http://localhost:7041/
egov.project.search.url=/project/v1/_search
egov.project.beneficiary.search.url=/project/beneficiary/v1/_search

# Encryption Service
egov.enc.host=http://localhost:7038/
egov.enc.encrypt.endpoint=/egov-enc-service/crypto/v1/_encrypt
egov.enc.decrypt.endpoint=/egov-enc-service/crypto/v1/_decrypt

# MDMS Module Names
mdms.notification.module=HCM-NOTIFICATION-CONFIG
mdms.project.module=HCM-PROJECT-TYPES

# SMS Configuration
notification.sms.enabled=true

# Notification Timezone (IANA timezone ID, e.g., Africa/Lagos, UTC)
# ALL date calculations (epoch->LocalDate, "today" for scheduler) use this timezone
#notification.timezone=Africa/Lagos
notification.timezone=Asia/Kolkata

# Stock Kafka Consumer Topics
stock.consumer.create.topic=save-stock-topic
stock.consumer.update.topic=update-stock-topic

# HFReferral Kafka Consumer Topics
hfreferral.consumer.create.topic=save-hfreferral-topic
hfreferral.consumer.update.topic=update-hfreferral-topic

# Push Notification Topics (Kafka)
kafka.topics.notification.push=egov.core.notification.push
notification.push.enabled=true

# Push Notification Service (REST API — reserved for future use)
egov.push.notification.host=http://localhost:8082
egov.push.notification.send.url=/egov-notification-push/v1/push/_send

# Stock Service
egov.stock.host=http://localhost:8082/
egov.stock.search.url=/stock/v1/_search

# Facility Service (for resolving warehouse users/names)
egov.facility.host=http://localhost:8083/
egov.facility.search.url=/facility/v1/_search

# Scheduler Configuration
# Enable/disable the scheduler (set to true in deployed environments)
notification.scheduler.enabled=true
# CRON expression: default = daily at 8:00 AM (in notification.timezone)
#notification.scheduler.cron=0 0 8 * * *
notification.scheduler.cron=0 */2 * * * *
# Batch size for processing notifications per iteration
notification.scheduler.batch.size=100
# Max rows fetched per scheduler run (prevents OOM on large backlogs; remainder picked up next run)
notification.scheduler.max.fetch=10000
