server.servlet.context-path=/health-notification-service
server.port=8080
app.timezone=UTC

spring.main.allow-bean-definition-overriding=true

# DATABASE CONFIG
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# FLYWAY CONFIG
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=public
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

# KAFKA SERVER CONFIG
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=health-notification-service
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# KAFKA CONSUMER CONFIG
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest

# KAFKA PRODUCER CONFIG
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432

# KAFKA TOPICS
# Project Task Topics
project.task.consumer.create.topic=save-project-task-topic

# SMS Topics (Producer)
kafka.topics.notification.sms=egov.core.notification.sms

# MDMS-V2 CONFIG
egov.mdms.host=http://localhost:8081/
egov.mdms.search.endpoint=/egov-mdms-service/v1/_search
egov.mdms.search.v2.endpoint=/egov-mdms-service/v2/_search

# Localization config
egov.localization.host=https://unified-dev.digit.org/
egov.localization.context.path=localization/messages/v1
egov.localization.search.endpoint=/_search
egov.localization.statelevel=true
egov.localization.notification.module=health-notification-sms

# Central Instance Multi Tenancy Configuration
state.level.tenant.id=default
state.level.tenantid.length=1
state.schema.index.position.tenantid=0
is.environment.central.instance=false

# External Service Integration
# Household Service
egov.household.host=https://unified-dev.digit.org/
egov.household.search.url=/household/v1/_search
egov.household.member.search.url=/household/member/v1/_search

# Individual Service
egov.individual.host=https://unified-dev.digit.org/
egov.individual.search.url=/individual/v1/_search

# Project Service (includes project and beneficiary endpoints)
egov.project.host=http://localhost:8081/
egov.project.search.url=/health-project/v1/_search
egov.project.beneficiary.search.url=/health-project/beneficiary/v1/_search

# MDMS Module Names
mdms.notification.module=HCM-NOTIFICATION-CONFIG
mdms.project.module=HCM-PROJECT-TYPES

# SMS Configuration
notification.sms.enabled=true
