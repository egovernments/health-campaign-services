server.port=8080
server.servlet.context-path=/excel-ingestion
app.timezone=UTC

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=excel_ingestion_flyway_history
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

# Environment Variables for Production (can override above)
# DB_URL, FLYWAY_USER, FLYWAY_PASSWORD, SCHEMA_NAME, SCHEMA_TABLE, FLYWAY_LOCATIONS

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer (used by the generation init listener)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.value.default.type=org.egov.excelingestion.web.models.GenerateResourceRequest
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Listener (single record poll + manual ack drives the queued -> in_progress -> terminal flow)
spring.kafka.listener.ack-mode=manual_immediate

# Kafka Producer Configuration
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432
spring.kafka.producer.properties.max.request.size=3000000

egov.boundary.host=http://localhost:8081/
egov.hierarchy.search.url=boundary-service/boundary-hierarchy-definition/_search
egov.boundary.relationship.search.url=boundary-service/boundary-relationships/_search
egov.filestore.host=http://localhost:8082/
egov.filestore.upload.endpoint=filestore/v1/files
egov.filestore.url.endpoint=filestore/v1/files/url

egov.localization.host=http://localhost:8083/
egov.localization.search.path=localization/messages/v1/_search

egov.mdms.host=http://localhost:8084/
egov.mdms.search.path=egov-mdms-service/v2/_search

# Campaign Service Configuration
egov.campaign.host=http://localhost:8085/
egov.campaign.data.search.path=project-factory/v1/data/campaign/_search
egov.campaign.crypto.bulk.decrypt.path=project-factory/v1/crypto/_bulkDecrypt

# Health Individual Service Configuration
egov.health.individual.host=http://localhost:8087/
egov.health.individual.search.path=health-individual/v1/_search

# HRMS Service Configuration
egov.hrms.host=http://localhost:8084/
egov.hrms.employee.search.path=egov-hrms/employees/_search
egov.hrms.employee.search.parallel.calls=100

# Attendance Service Configuration
egov.attendance.host=http://localhost:8088/
egov.attendance.register.search.path=attendance/v1/_search
egov.attendance.register.search.batch.size=100
egov.attendance.register.search.parallel.calls=10
egov.attendance.attendee.search.path=attendance/attendee/v1/_search
egov.attendance.attendee.search.page.size=100
egov.attendance.staff.search.path=attendance/staff/v1/_search
egov.attendance.staff.search.page.size=100

# Facility Service Configuration
egov.facility.host=http://localhost:8090/
egov.facility.search.path=facility/v1/_search

# Worker Registry Service Configuration
egov.worker.registry.host=http://localhost:8089/
egov.worker.registry.search.path=worker/v1/_search
egov.worker.registry.search.batch.size=100

# Central Instance Configuration
state.level.tenantid.length=1
is.environment.central.instance=false

# Excel configuration
excel.row.limit=5000
excel.max.process.row.limit=100000
excel.sheet.name.max.length=31

# Apache POI global safety limits (large-file hardening)
poi.byte.array.max.bytes=300000000
poi.zip.min.inflate.ratio=0.001
default.locale=en_IN
egov.excel.sheet.password=passwordhere
egov.excel.sheet.zoom=90
egov.excel.validation.error.color=#ff0000

# Kafka Topics for Generation Service
# Topics used by producer (will be prefixed with state code if central instance is enabled)
excel.ingestion.generation.save.topic=save-generated-file
excel.ingestion.generation.update.topic=update-generated-file

# Async init trigger topic - consumed in-process to drive the actual generation work
excel.ingestion.generation.init.topic=excel-ingestion-generation-init

# Kafka Consumer (for generation init events) - single record poll, manual ack.
# Group id is shared with the rest of the service via spring.kafka.consumer.group-id
# (overridden in deployed envs via SPRING_KAFKA_CONSUMER_GROUP_ID).
#
# WARNING: max-poll-records is pinned to 1 below, and listener.concurrency is
# left at Spring Kafka's default of 1. The consumer logic (manual ack +
# queued->in_progress transition without DB locking) assumes BOTH are 1.
# Raising either without first adding a compare-and-set on the status
# transition will cause duplicate generation runs.
spring.kafka.consumer.group-id=excel-ingestion
spring.kafka.consumer.max-poll-records=1
spring.kafka.consumer.properties.max.poll.interval.ms=900000
spring.kafka.consumer.properties.session.timeout.ms=120000

# Generation row readiness wait (consumer polls DB briefly until the persister has created the row)
excel.ingestion.generation.row.wait.timeout.ms=10000
excel.ingestion.generation.row.wait.interval.ms=250

# Processing topics
excel.ingestion.processing.save.topic=save-processing-file
excel.ingestion.processing.update.topic=update-processing-file

# Sheet data topics
excel.ingestion.sheet.data.save.topic=save-sheet-data-temp
excel.ingestion.sheet.data.delete.topic=delete-sheet-data-temp

# Processing result topic
excel.ingestion.processing.result.topic=hcm-processing-result

# OpenTelemetry configuration
otel.traces.exporter=none
otel.logs.exporter=none
otel.metrics.exporter=none