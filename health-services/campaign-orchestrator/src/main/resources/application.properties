server.servlet.context-path=/campaign-orchestrator
server.port=8080
app.timezone=UTC

# DATABASE CONFIG
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# FLYWAY CONFIG
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=public
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=false

# REDIS CONFIG
spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300
spring.cache.autoexpiry=true

# KAFKA SERVER CONFIG
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.group-id=campaign-orchestrator
spring.kafka.listener.missing-topics-fatal=false

# CENTRAL INSTANCE CONFIG
is.environment.central.instance=false
state.level.tenantid.length=1
state.schema.index.position.tenantid=0

# CAMPAIGN KAFKA TOPICS
cms.campaign.command.draft=cms.campaign.command.draft
cms.campaign.command.create=cms.campaign.command.create
cms.campaign.event.drafted=cms.campaign.event.drafted
cms.campaign.event.status.changed=cms.campaign.event.status.changed

# SAGA KAFKA TOPICS
cms.saga.command.start=cms.saga.command.start
cms.saga.command.step.execute=cms.saga.command.step.execute
cms.saga.command.step.compensate=cms.saga.command.step.compensate
cms.saga.event.step.completed=cms.saga.event.step.completed
cms.saga.event.step.failed=cms.saga.event.step.failed
cms.saga.event.completed=cms.saga.event.completed
cms.saga.event.failed=cms.saga.event.failed

# EXCEL KAFKA TOPICS
cms.excel.command.generate=cms.excel.command.generate
cms.excel.command.process=cms.excel.command.process
cms.excel.event.generation.completed=cms.excel.event.generation.completed
cms.excel.event.processing.completed=cms.excel.event.processing.completed

# RESOURCE PROVISIONER KAFKA TOPICS
cms.resource.command.project.create=cms.resource.command.project.create
cms.resource.command.user.create=cms.resource.command.user.create
cms.resource.command.facility.create=cms.resource.command.facility.create
cms.resource.command.mapping.apply=cms.resource.command.mapping.apply
cms.resource.event.project.created=cms.resource.event.project.created
cms.resource.event.user.created=cms.resource.event.user.created
cms.resource.event.facility.created=cms.resource.event.facility.created
cms.resource.event.mapping.applied=cms.resource.event.mapping.applied

# DEAD LETTER QUEUE
cms.dlq=cms.dlq

# KAFKA CONSUMER CONCURRENCY
cms.kafka.consumer.concurrency.saga.coordinator=5
cms.kafka.consumer.concurrency.project.provisioner=20
cms.kafka.consumer.concurrency.user.provisioner=30
cms.kafka.consumer.concurrency.facility.provisioner=20
cms.kafka.consumer.concurrency.mapping.reconciler=15
cms.kafka.consumer.concurrency.excel.processor=10
cms.kafka.consumer.concurrency.excel.generator=5

# BATCH CONFIG
cms.batch.boundary.chunk.size=500
cms.batch.user.chunk.size=100
cms.batch.facility.chunk.size=100
cms.batch.mapping.chunk.size=50
cms.batch.project.api.batch.size=50
cms.batch.boundary.search.chunk.size=50
cms.batch.idgen.chunk.size=1000

# SAGA CONFIG
cms.saga.max.retry.default=3
cms.saga.max.retry.user=5
cms.saga.max.retry.mapping=5
cms.saga.max.reconcile.cycles=5
cms.saga.reconcile.stall.timeout.ms=300000
cms.saga.step.timeout.project.ms=600000
cms.saga.step.timeout.user.ms=900000
cms.saga.step.timeout.facility.ms=600000

# IDEMPOTENCY CONFIG
cms.idempotency.ttl.days=7

# HRMS CONFIG
egov.hrms.host=http://health-hrms:8080
egov.hrms.employee.create.url=/health-hrms/employee/v1/_create
egov.hrms.employee.search.url=/health-hrms/employee/v1/_search

# PROJECT CONFIG
egov.project.host=http://health-project:8080
egov.project.create.url=/project/v1/_create
egov.project.search.url=/project/v1/_search
egov.project.staff.create.url=/project/v1/staff/_create
egov.project.staff.search.url=/project/v1/staff/_search
egov.project.staff.delete.url=/project/v1/staff/_delete
egov.project.facility.create.url=/project/v1/facility/_create
egov.project.facility.search.url=/project/v1/facility/_search
egov.project.facility.delete.url=/project/v1/facility/_delete
egov.project.resource.create.url=/project/v1/resource/_create
egov.project.resource.search.url=/project/v1/resource/_search

# FACILITY CONFIG
egov.facility.host=http://facility:8080
egov.facility.create.url=/facility/v1/_create
egov.facility.search.url=/facility/v1/_search

# BOUNDARY CONFIG
egov.boundary.host=http://boundary-service:8080
egov.boundary.search.url=/boundary-service/boundary/v1/_search
egov.boundary.hierarchy.search.url=/boundary-service/boundary/v1/hierarchy/_search

# IDGEN CONFIG
egov.idgen.host=http://egov-idgen:8080
egov.idgen.generate.url=/egov-idgen/id/_generate

# MDMS CONFIG
egov.mdms.host=http://egov-mdms-service:8080
egov.mdms.v2.host=http://mdms-v2:8080
egov.mdms.search.url=/mdms-service/v1/_search
egov.mdms.v2.search.url=/mdms-v2/v2/_search

# LOCALIZATION CONFIG
egov.localization.host=http://egov-localization:8080
egov.localization.search.url=/localization/messages/v1/_search
egov.localization.upsert.url=/localization/messages/v1/_upsert

# FILESTORE CONFIG
egov.filestore.host=http://egov-filestore:8080
egov.filestore.upload.url=/filestore/v1/files
egov.filestore.download.url=/filestore/v1/files/id

# WORKER REGISTRY CONFIG
egov.worker.registry.host=http://worker-registry:8080
egov.worker.registry.create.url=/worker/v1/_create
egov.worker.registry.search.url=/worker/v1/_search

# CIRCUIT BREAKER CONFIG
resilience4j.circuitbreaker.instances.hrms.sliding-window-size=10
resilience4j.circuitbreaker.instances.hrms.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.hrms.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.hrms.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.project.sliding-window-size=20
resilience4j.circuitbreaker.instances.project.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.project.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.boundary.sliding-window-size=20
resilience4j.circuitbreaker.instances.boundary.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.boundary.wait-duration-in-open-state=10s

# TRACER CONFIG
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
otel.traces.exporter=none
otel.logs.exporter=none
otel.metrics.exporter=none
