<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDL Query Console</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #1a1a2e;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .header-config { display: flex; gap: 12px; align-items: center; }
  .header-config label { font-size: 12px; color: #aaa; }
  .header-config input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    color: #fff;
    padding: 4px 8px;
    font-size: 12px;
    width: 140px;
  }
  .header-config input::placeholder { color: rgba(255,255,255,0.4); }

  /* Query section */
  .query-section {
    background: #fff;
    padding: 20px 24px;
    border-bottom: 1px solid #e0e0e0;
  }
  .query-section label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    display: block;
    margin-bottom: 8px;
  }
  .query-row {
    display: flex;
    gap: 10px;
  }
  .query-row input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .query-row input:focus { border-color: #3f51b5; box-shadow: 0 0 0 2px rgba(63,81,181,0.15); }
  .query-row button {
    background: #3f51b5;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .query-row button:hover { background: #303f9f; }
  .query-row button:disabled { background: #bbb; cursor: not-allowed; }

  /* Results area */
  .results-area {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
  }

  .welcome-msg {
    text-align: center;
    color: #999;
    margin-top: 80px;
    font-size: 14px;
  }
  .welcome-msg .icon { font-size: 40px; margin-bottom: 12px; display: block; }

  /* Loading */
  .loading {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 40px;
  }
  .loading .dot {
    width: 10px; height: 10px;
    background: #3f51b5;
    border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite both;
  }
  .loading .dot:nth-child(1) { animation-delay: -0.32s; }
  .loading .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Error */
  .error-box {
    background: #fff0f0;
    color: #c0392b;
    border: 1px solid #e74c3c;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 14px;
  }

  /* Result panels */
  .result-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .result-panel {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-header {
    background: #fafafa;
    border-bottom: 1px solid #e0e0e0;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }
  .panel-body {
    padding: 12px 16px;
  }

  /* Metadata row */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .meta-badge {
    background: #e8eaf6;
    color: #3f51b5;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .meta-badge.interpreted {
    background: #f3e5f5;
    color: #7b1fa2;
  }

  /* Data table */
  .data-table-wrapper {
    overflow-x: auto;
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table thead th {
    background: #f5f5f5;
    border-bottom: 2px solid #ddd;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    color: #444;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .data-table tbody td {
    border-bottom: 1px solid #eee;
    padding: 7px 12px;
    color: #333;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .data-table tbody tr:hover td {
    background: #f9f9ff;
  }
  .data-table tbody tr:last-child td {
    border-bottom: none;
  }

  /* JSON block for query */
  pre.json-block {
    background: #1e1e2e;
    color: #a6e3a1;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 12px;
    overflow-x: auto;
    max-height: 350px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
  }

  /* Toggle button for query panel */
  .toggle-btn {
    background: none;
    border: 1px solid #ccc;
    color: #666;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .toggle-btn:hover { background: #f0f0f0; }

  .no-data {
    color: #999;
    font-size: 13px;
    padding: 20px;
    text-align: center;
  }

  .cell-expanded {
    white-space: normal !important;
    word-break: break-word !important;
  }
</style>
</head>
<body>

<div class="header">
  <h1>CDL Query Console</h1>
  <div class="header-config">
    <div>
      <label>Tenant ID</label>
      <input type="text" id="tenantId" placeholder="optional">
    </div>
    <div>
      <label>Index Name</label>
      <input type="text" id="indexName" placeholder="optional">
    </div>
  </div>
</div>

<div class="query-section">
  <label>Natural Language Query</label>
  <div class="query-row">
    <input type="text" id="queryInput" placeholder="e.g. Show all campaigns created in the last 7 days" autocomplete="off">
    <button id="sendBtn" onclick="submitQuery()">Run Query</button>
  </div>
</div>

<div class="results-area" id="resultsArea">
  <div class="welcome-msg" id="welcomeMsg">
    <span class="icon">&#128269;</span>
    Enter a natural language query above to search your Elasticsearch data.<br>
    Each query runs independently &mdash; results replace the previous response.
  </div>
</div>

<script>
  var resultsArea = document.getElementById('resultsArea');
  var queryInput = document.getElementById('queryInput');
  var sendBtn = document.getElementById('sendBtn');

  queryInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !sendBtn.disabled) submitQuery();
  });

  function submitQuery() {
    var text = queryInput.value.trim();
    if (!text) return;

    sendBtn.disabled = true;
    resultsArea.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    var tenantId = document.getElementById('tenantId').value.trim();
    var indexName = document.getElementById('indexName').value.trim();

    var body = {
      RequestInfo: { apiId: 'cdl', ver: '1.0' },
      CdlQuery: { queryText: text }
    };
    if (tenantId) body.CdlQuery.tenantId = tenantId;
    if (indexName) body.CdlQuery.indexName = indexName;

    fetch('/conversational-data-layer/cdl/v1/_query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
      return res.json();
    })
    .then(function(data) {
      renderResult(data);
    })
    .catch(function(err) {
      resultsArea.innerHTML = '<div class="error-box">' + escapeHtml(err.message || 'Request failed') + '</div>';
    })
    .finally(function() {
      sendBtn.disabled = false;
      queryInput.focus();
    });
  }

  function renderResult(data) {
    var html = '<div class="result-container">';

    // Metadata badges
    html += '<div class="meta-row">';
    if (data.selectedIndex) html += '<span class="meta-badge">Index: ' + escapeHtml(data.selectedIndex) + '</span>';
    if (data.totalHits !== undefined) html += '<span class="meta-badge">Hits: ' + data.totalHits + '</span>';
    if (data.queryTimeMs !== undefined) html += '<span class="meta-badge">Time: ' + data.queryTimeMs + 'ms</span>';
    if (data.sanitizedQueryText) html += '<span class="meta-badge interpreted">Interpreted: ' + escapeHtml(data.sanitizedQueryText) + '</span>';
    html += '</div>';

    // Generated Query panel
    if (data.generatedQuery) {
      var qid = 'q' + Date.now();
      html += '<div class="result-panel">';
      html += '<div class="panel-header">';
      html += '<span class="panel-title">Generated ES Query</span>';
      html += '<button class="toggle-btn" onclick="togglePanel(\'' + qid + '\', this)">Hide</button>';
      html += '</div>';
      html += '<div class="panel-body" id="' + qid + '">';
      var queryStr = typeof data.generatedQuery === 'string' ? data.generatedQuery : JSON.stringify(data.generatedQuery, null, 2);
      html += '<pre class="json-block">' + escapeHtml(queryStr) + '</pre>';
      html += '</div></div>';
    }

    // Data table panel
    if (data.data !== undefined && data.data !== null) {
      var esData = data.data;
      var hasAggregations = esData.aggregations && typeof esData.aggregations === 'object';
      var hitsArray = (esData.hits && esData.hits.hits) ? esData.hits.hits : [];

      // Aggregations panel
      if (hasAggregations) {
        html += '<div class="result-panel">';
        html += '<div class="panel-header"><span class="panel-title">Aggregation Results</span></div>';
        html += '<div class="panel-body">';
        html += buildAggregationTables(esData.aggregations);
        html += '</div></div>';
      }

      // Hits panel (show if there are hits, or if there are no aggregations)
      if (hitsArray.length > 0 || !hasAggregations) {
        html += '<div class="result-panel">';
        html += '<div class="panel-header"><span class="panel-title">Response Data</span></div>';
        html += '<div class="panel-body">';
        if (hitsArray.length > 0) {
          html += buildHitsTable(hitsArray);
        } else {
          html += '<div class="no-data">No results found.</div>';
        }
        html += '</div></div>';
      }
    } else {
      html += '<div class="result-panel">';
      html += '<div class="panel-header"><span class="panel-title">Response Data</span></div>';
      html += '<div class="panel-body"><div class="no-data">No data returned.</div></div></div>';
    }
    html += '</div>';

    resultsArea.innerHTML = html;
  }

  function buildHitsTable(hits) {
    // Flatten _source from each ES hit
    var flatRows = hits.map(function(hit) {
      var flat = {};
      if (hit._id) flat['_id'] = hit._id;
      if (hit._index) flat['_index'] = hit._index;
      var source = hit._source || {};
      var keys = Object.keys(source);
      for (var i = 0; i < keys.length; i++) {
        var val = source[keys[i]];
        flat[keys[i]] = (typeof val === 'object' && val !== null) ? JSON.stringify(val) : val;
      }
      return flat;
    });

    // Collect all column headers
    var colSet = {};
    for (var r = 0; r < flatRows.length; r++) {
      var ks = Object.keys(flatRows[r]);
      for (var c = 0; c < ks.length; c++) colSet[ks[c]] = true;
    }
    var columns = Object.keys(colSet);
    if (columns.length === 0) return '<div class="no-data">Empty results.</div>';

    var html = '<div class="data-table-wrapper"><table class="data-table">';
    html += '<thead><tr>';
    for (var h = 0; h < columns.length; h++) {
      html += '<th>' + escapeHtml(columns[h]) + '</th>';
    }
    html += '</tr></thead><tbody>';
    for (var ri = 0; ri < flatRows.length; ri++) {
      html += '<tr>';
      for (var ci = 0; ci < columns.length; ci++) {
        var cellVal = flatRows[ri][columns[ci]];
        var display = cellVal !== undefined && cellVal !== null ? String(cellVal) : '';
        html += '<td title="' + escapeHtml(display) + '">' + escapeHtml(display) + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function buildAggregationTables(aggregations) {
    var html = '';
    var aggKeys = Object.keys(aggregations);

    for (var a = 0; a < aggKeys.length; a++) {
      var aggName = aggKeys[a];
      var agg = aggregations[aggName];

      html += '<div style="margin-bottom:12px;">';
      html += '<div style="font-size:12px;font-weight:600;color:#555;margin-bottom:6px;">' + escapeHtml(aggName) + '</div>';

      if (agg.buckets && Array.isArray(agg.buckets)) {
        // Bucket aggregation (terms, histogram, date_histogram, etc.)
        html += buildBucketTable(agg.buckets, aggName);
      } else if (agg.value !== undefined) {
        // Single-value metric (sum, avg, min, max, cardinality, etc.)
        html += '<div class="data-table-wrapper"><table class="data-table">';
        html += '<thead><tr><th>Metric</th><th>Value</th></tr></thead>';
        html += '<tbody><tr><td>' + escapeHtml(aggName) + '</td><td>' + escapeHtml(String(agg.value)) + '</td></tr></tbody>';
        html += '</table></div>';
      } else if (agg.values && typeof agg.values === 'object') {
        // Multi-value metric (percentiles, stats, etc.)
        html += '<div class="data-table-wrapper"><table class="data-table">';
        html += '<thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';
        var vkeys = Object.keys(agg.values);
        for (var vi = 0; vi < vkeys.length; vi++) {
          html += '<tr><td>' + escapeHtml(vkeys[vi]) + '</td><td>' + escapeHtml(String(agg.values[vkeys[vi]])) + '</td></tr>';
        }
        html += '</tbody></table></div>';
      } else {
        // Stats-like aggregation (count, min, max, avg, sum at top level)
        var statKeys = Object.keys(agg).filter(function(k) { return typeof agg[k] !== 'object'; });
        if (statKeys.length > 0) {
          html += '<div class="data-table-wrapper"><table class="data-table">';
          html += '<thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>';
          for (var si = 0; si < statKeys.length; si++) {
            html += '<tr><td>' + escapeHtml(statKeys[si]) + '</td><td>' + escapeHtml(String(agg[statKeys[si]])) + '</td></tr>';
          }
          html += '</tbody></table></div>';
        } else {
          // Fallback: render as JSON
          html += '<pre class="json-block">' + escapeHtml(JSON.stringify(agg, null, 2)) + '</pre>';
        }
      }
      html += '</div>';
    }
    return html;
  }

  function buildBucketTable(buckets, aggName) {
    if (buckets.length === 0) return '<div class="no-data">No buckets returned.</div>';

    // Detect columns: key, doc_count, plus any sub-aggregation values
    var extraCols = {};
    for (var b = 0; b < buckets.length; b++) {
      var bkeys = Object.keys(buckets[b]);
      for (var bk = 0; bk < bkeys.length; bk++) {
        var col = bkeys[bk];
        if (col === 'key' || col === 'doc_count' || col === 'key_as_string') continue;
        extraCols[col] = true;
      }
    }
    var subAggNames = Object.keys(extraCols);

    var html = '<div class="data-table-wrapper"><table class="data-table">';
    html += '<thead><tr><th>Key</th><th>Count</th>';
    for (var s = 0; s < subAggNames.length; s++) {
      html += '<th>' + escapeHtml(subAggNames[s]) + '</th>';
    }
    html += '</tr></thead><tbody>';

    for (var bi = 0; bi < buckets.length; bi++) {
      var bucket = buckets[bi];
      var keyDisplay = bucket.key_as_string || bucket.key;
      html += '<tr>';
      html += '<td>' + escapeHtml(String(keyDisplay)) + '</td>';
      html += '<td>' + escapeHtml(String(bucket.doc_count)) + '</td>';
      for (var sc = 0; sc < subAggNames.length; sc++) {
        var subVal = bucket[subAggNames[sc]];
        if (subVal && subVal.value !== undefined) {
          html += '<td>' + escapeHtml(String(subVal.value)) + '</td>';
        } else if (subVal && subVal.buckets) {
          html += '<td>' + escapeHtml(subVal.buckets.length + ' buckets') + '</td>';
        } else {
          html += '<td>' + escapeHtml(JSON.stringify(subVal)) + '</td>';
        }
      }
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    return html;
  }

  function togglePanel(id, btn) {
    var el = document.getElementById(id);
    if (el.style.display === 'none') {
      el.style.display = '';
      btn.textContent = 'Hide';
    } else {
      el.style.display = 'none';
      btn.textContent = 'Show';
    }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  queryInput.focus();
</script>

</body>
</html>
