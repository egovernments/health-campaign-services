server.port=8090
server.servlet.context-path=/conversational-data-layer
app.timezone=UTC

# Management
management.endpoints.web.base-path=/

# LLM provider selection (ollama | openai | groq | anthropic)
cdl.llm.provider=groq

# LLM fallback
cdl.llm.fallback-enabled=false
cdl.llm.primary=groq
cdl.llm.secondary=anthropic

# Prompt guard
cdl.llm.max-prompt-length=32000

# Ollama
cdl.llm.ollama.base-url=http://localhost:11434
cdl.llm.ollama.model=mistral
cdl.llm.ollama.temperature=0
cdl.llm.ollama.timeout-ms=180000

# OpenAI
cdl.llm.openai.api-key=${OPENAI_API_KEY:}
cdl.llm.openai.base-url=https://api.openai.com
cdl.llm.openai.model=gpt-4o
cdl.llm.openai.temperature=0
cdl.llm.openai.timeout-ms=60000
cdl.llm.openai.max-tokens=4096
cdl.llm.openai.max-retries=3

# Groq
cdl.llm.groq.api-key=${GROQ_API_KEY:}
cdl.llm.groq.base-url=https://api.groq.com
cdl.llm.groq.model=llama-3.3-70b-versatile
cdl.llm.groq.temperature=0
cdl.llm.groq.timeout-ms=20000
cdl.llm.groq.max-tokens=1024

# Anthropic
cdl.llm.anthropic.api-key=${ANTHROPIC_API_KEY:}
cdl.llm.anthropic.base-url=https://api.anthropic.com
cdl.llm.anthropic.model=claude-3-haiku-20240307
cdl.llm.anthropic.temperature=0
cdl.llm.anthropic.timeout-ms=30000
cdl.llm.anthropic.max-tokens=1024
cdl.llm.anthropic.max-retries=3

# Elasticsearch
cdl.elasticsearch.host=elasticsearch-master
cdl.elasticsearch.port=9200
cdl.elasticsearch.scheme=https

# Elasticsearch auth (none | basic | api-key)
cdl.elasticsearch.auth.type=basic
cdl.elasticsearch.auth.username=read_user
cdl.elasticsearch.auth.password=egov@1234
cdl.elasticsearch.auth.api-key=

# Query limits
cdl.query.max.size=100
cdl.query.default.size=10
cdl.query.timeout=5s
cdl.query.max.agg.depth=3

# Default index
cdl.index.name=oy-project-task-index-v1

# Disable datasource auto-config (stateless POC)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# Kafka (required by tracer but unused - provide defaults)
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=conversational-data-layer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false
