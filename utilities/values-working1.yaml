# Airflow version and image
airflowVersion: "3.0.2"
defaultAirflowRepository: egovio/airflow
defaultAirflowTag: "3.0.2-custom2"

# Executor
executor: "KubernetesExecutor"

# Fernet key for encrypting connections/variables (generate with:
#   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
fernetKey: ""

# Airflow config overrides
config:
  api:
    base_url: "/airflow"
    enable_proxy_fix: "True"
  core:
    auth_manager: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    load_examples: "False"
    dags_folder: "/opt/airflow/dags/repo/utilities/airflow-dags/dags"
  webserver:
    base_url: "https://burundi-uat.digit.org/airflow"
    enable_proxy_fix: "True"
    rbac: "True"
  fab:
    enable_proxy_fix: "True"
  scheduler:
    standalone_dag_processor: "True"
  logging:
    remote_logging: "False"

# DAG Processor
dagProcessor:
  enabled: true

# Git-Sync for DAGs
dags:
  gitSync:
    enabled: true
    repo: "https://github.com/egovernments/health-campaign-services.git"
    branch: "airflow-godeep"
    rev: "HEAD"
    ref: "v2-2-stable"
    depth: 1
    wait: 60
    period: "5s"
    maxFailures: 0
    subPath: ""

# Logs - disable persistent storage for testing (uses emptyDir)
logs:
  persistence:
    enabled: false


# Worker pod template - resource limits for KubernetesExecutor pods
workers:
  resources:
    limits:
      cpu: "1"
      memory: "2Gi"
    requests:
      cpu: "0.5"
      memory: "1Gi"

# Extra environment variables
env:
  - name: AIRFLOW__LOGGING__BASE_LOG_FOLDER
    value: "/opt/airflow/logs"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__AIRFLOW__LOGGING__BASE_LOG_FOLDER
    value: "/opt/airflow/logs"
  - name: AIRFLOW__LOGGING__REMOTE_LOGGING
    value: "False"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__AIRFLOW__LOGGING__REMOTE_LOGGING
    value: "False"
  - name: MDMS_URL
    value: "http://mdms-v2.egov.svc.cluster.local:8080/"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__MDMS_URL
    value: "http://mdms-v2.egov.svc.cluster.local:8080/"
  - name: MDMS_SEARCH_ENDPOINT
    value: "mdms-v2/v2/_search"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__MDMS_SEARCH_ENDPOINT
    value: "mdms-v2/v2/_search"
  - name: TENANT_ID
    value: "bi"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__TENANT_ID
    value: "bi"
  - name: LIMIT
    value: "100"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__LIMIT
    value: "100"
  - name: FILE_STORE_URL
    value: "http://egov-filestore.egov.svc.cluster.local:8080/"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__FILE_STORE_URL
    value: "http://egov-filestore.egov.svc.cluster.local:8080/"
  - name: FILE_STORE_UPLOAD_FILE_ENDPOINT
    value: "filestore/v1/files"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__FILE_STORE_UPLOAD_FILE_ENDPOINT
    value: "filestore/v1/files"
  - name: KAFKA_BROKER
    value: "release-name-kafka-controller-headless.kafka-cluster.svc.cluster.local:9092"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__KAFKA_BROKER
    value: "release-name-kafka-controller-headless.kafka-cluster.svc.cluster.local:9092"
  - name: CUSTOM_REPORTS_AUTOMATION_TOPIC
    value: "save-hcm-report-metadata"
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__CUSTOM_REPORTS_AUTOMATION_TOPIC
    value: "save-hcm-report-metadata"

# Extra env vars with valueFrom (secrets)
extraEnv: |
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elastic
        key: password
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elastic
        key: password
  - name: ELASTIC_USERNAME
    valueFrom:
      secretKeyRef:
        name: elastic
        key: username
  - name: AIRFLOW__KUBERNETES_ENVIRONMENT_VARIABLES__ELASTIC_USERNAME
    valueFrom:
      secretKeyRef:
        name: elastic
        key: username

# PostgreSQL (bundled subchart)
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres

# StatsD
statsd:
  enabled: true
