# StatsD
statsd:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "63Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

triggerer:
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "200m"
      memory: "1Gi"

apiServer:
  resources:
    requests:
      cpu: "200m"
      memory: "1.5Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"